global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "space_app_api"
    metrics_path: "/metrics"
    static_configs:
      - targets: ["host.docker.internal:5085"]
  
  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres-exporter:9187']
    metrics_path: /metrics